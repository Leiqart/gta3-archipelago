; MissionSelector debug key bindings
; Format:  action = key   (one action per line)
; Keys:    a letter/digit (P, 5), a function key (F1..F12) or SPACE/ENTER/TAB
; Disable: comment a line with // or ; (or delete it)

test_print           = P    ; PRINT_NOW brief test
wanted_trap          = M    ; 3-star police trap
clear_wanted         = C    ; clear the police wanted level
death                = H    ; die + respawn at nearest hospital
unlock_character     = F2   ; unlock the next mission character
unlock_everything    = F4   ; unlock ALL contacts + all islands at once
// unlock_island     = F7   ; RETIRED — islands now open automatically via mission completion / AP checks
// validate_mission     = F3   ; DISABLED (bugged) — rework later
objective_teleport   = K    ; cycle-warp through this mission's recorded positions (F1 = game replay)
record_position      = J    ; save player position (2-superscript/0xDE OEM key is unreliable)
kill_npcs            = L    ; kill all peds within 50 m of the player
crossing_teleport    = F5   ; cycle the inter-island choke points
spawn_car            = F6   ; spawn an Infernus
give_weapons         = G    ; give the player a full weapon loadout
cycle_player_skin    = F10  ; cycle Claude skin aliases: PLAYERX/PLAYER/PLAYERP
safehouse_teleport   = F9   ; cycle the safehouses
package_teleport     = F8   ; teleport onto the next hidden package (cycles all of them)
vehicle_smoke        = F11  ; set current vehicle smoking
vehicle_fire         = F12  ; set current vehicle on fire
