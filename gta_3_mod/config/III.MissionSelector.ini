; MissionSelector startup config
; debug_open_islands=1 would select the old debug SCM path, but that variant is disabled
; unlock_missions_atomically=1 keeps later missions locked until the previous one is validated
; use_classic_mission_markers=1 lets vanilla mission markers launch AP-tracked missions
; require_ap_mission_unlock_items=1 requires AP unlock_mission_* items before mission launch
; keep_weapons_on_death=1 keeps your weapons when the H death hotkey respawns you at the hospital
; Archipelago connection settings now live in AP_connexion.txt
debug_open_islands=0
unlock_missions_atomically=1
use_classic_mission_markers=1
require_ap_mission_unlock_items=0
keep_weapons_on_death=1
